# Codecov configuration
coverage:
  status:
    project:
      default:
        target: 70%
        threshold: 5%
    patch:
      default:
        target: 70%

# Define flags for different components
flags:
  frontend:
    paths:
      - frontend/src/
    carryforward: true
  backend:
    paths:
      - backend/src/
    carryforward: true

# Component-based coverage reporting
component_management:
  default_rules:
    statuses:
      - type: project
        target: auto
        branches:
          - main
  individual_components:
    - component_id: frontend
      name: Frontend
      paths:
        - frontend/src/**
    - component_id: backend
      name: Backend
      paths:
        - backend/src/**

comment:
  layout: "header, diff, flags, components"
  behavior: default
  require_changes: false
